spring:
  datasource:
    url: jdbc:mysql://localhost:3306/geuphalttaen?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:geuphalttaen}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

jwt:
  secret: local-dev-secret-key-must-be-at-least-32-characters-long
