spring:
  datasource:
    url: jdbc:mysql://localhost:3306/geuphalttaen?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:geuphalttaen}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        show_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

jwt:
  secret: local-dev-secret-key-must-be-at-least-32-characters-long

admin:
  seed-secret: ${ADMIN_SEED_SECRET:local-dev-seed-secret}
