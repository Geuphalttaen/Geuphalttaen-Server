spring:
  application:
    name: geuphalttaen

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/geuphalttaen?characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:geuphalttaen}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:change-me-this-is-a-very-long-secret-key-for-dev-only}

kakao:
  oauth:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}

opendata:
  toilet:
    api-key: ${OPENDATA_TOILET_API_KEY:}
    base-url: ${OPENDATA_TOILET_BASE_URL:https://api.odcloud.kr/api}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, info
